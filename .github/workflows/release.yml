name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Run tests
        run: uv run pytest

      - name: Build wheel
        run: uv build --wheel

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WHEEL="dist/chift_cli-${VERSION}-py3-none-any.whl"

          gh release create "$GITHUB_REF_NAME" \
            --title "chift-cli $GITHUB_REF_NAME" \
            --generate-notes \
            "$WHEEL"
