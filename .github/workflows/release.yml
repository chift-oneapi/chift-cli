name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv run pytest

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-13
            target: darwin-amd64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Build binary
        run: |
          uv sync --dev
          uv run pyinstaller \
            --onefile \
            --name chift-${{ matrix.target }} \
            --collect-all chift_cli \
            src/chift_cli/__main__.py

      - name: Package tarball + checksum
        working-directory: dist
        run: |
          BIN="chift-${{ matrix.target }}"
          TARBALL="${BIN}.tar.gz"
          chmod +x "$BIN"
          tar -czf "$TARBALL" "$BIN"
          if [ "$RUNNER_OS" = "macOS" ]; then
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          else
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chift-${{ matrix.target }}
          path: |
            dist/chift-${{ matrix.target }}.tar.gz
            dist/chift-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "chift-cli $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.tar.gz dist/*.tar.gz.sha256
