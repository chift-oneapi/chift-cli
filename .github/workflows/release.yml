name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: darwin
            arch: amd64
            runner: macos-14
          - os: linux
            arch: amd64
            runner: ubuntu-22.04
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: windows
            arch: amd64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with Nuitka
        run: |
          uv run python -m nuitka \
            --standalone \
            --output-filename="chift-${{ matrix.os }}-${{ matrix.arch }}" \
            --output-dir=build \
            --include-package=chift_cli \
            --include-package-data=chift_cli \
            --python-flag=no_site \
            --assume-yes-for-downloads \
            src/chift_cli/__main__.py

      - name: Package standalone directory
        run: |
          cd build
          tar -czf "chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" __main__.dist/

      - name: Generate checksum
        run: |
          cd build
          if [ "${{ matrix.os }}" = "darwin" ]; then
            shasum -a 256 "chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > "chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256"
          else
            sha256sum "chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > "chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: chift-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build/chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            build/chift-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Verify expected artifacts
        run: |
          for platform in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64 windows-amd64; do
            test -f "chift-${platform}.tar.gz" || { echo "Missing chift-${platform}.tar.gz"; exit 1; }
            test -f "chift-${platform}.tar.gz.sha256" || { echo "Missing chift-${platform}.tar.gz.sha256"; exit 1; }
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            chift-darwin-arm64.tar.gz \
            chift-darwin-arm64.tar.gz.sha256 \
            chift-darwin-amd64.tar.gz \
            chift-darwin-amd64.tar.gz.sha256 \
            chift-linux-amd64.tar.gz \
            chift-linux-amd64.tar.gz.sha256 \
            chift-linux-arm64.tar.gz \
            chift-linux-arm64.tar.gz.sha256 \
            chift-windows-amd64.tar.gz \
            chift-windows-amd64.tar.gz.sha256

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/chift-cli

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish
